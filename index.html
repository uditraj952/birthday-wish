<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎂</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- Start Screen -->
  <div class="card start-screen">
    <h2>🎉 Birthday Surprise 🎉</h2>
    <input id="nameInput" placeholder="Enter Name 💖">
    <button onclick="startApp()">Start</button>
  </div>

  <!-- Main -->
  <div class="card main hidden">

    <h1 id="title"></h1>

    <!-- Cake -->
   <div class="cake" id="cake">

  <div class="candle" id="candle">
    <div class="flame" id="flame"></div>
  </div>

  <div class="cake-half left">
    <div class="icing"></div>
    <div class="layer layer-top"></div>
    <div class="layer layer-middle"></div>
    <div class="layer layer-bottom"></div>
  </div>

  <div class="cake-half right">
    <div class="icing"></div>
    <div class="layer layer-top"></div>
    <div class="layer layer-middle"></div>
    <div class="layer layer-bottom"></div>
  </div>

</div>

    <p id="instruction">🎂 Blow the candle</p>

    <button id="cutBtn" onclick="cutCake()" disabled>🔪 Cut Cake</button>
    <button onclick="playMusic()">🎵 Music</button>

    <p id="wish" class="hidden">
      💌 Wishing you happiness. success & lots  of love hope tera aaj ka dinn kya sare din acche jaye cutie ❤️
    </p>

  </div>

</div>

<canvas id="confetti"></canvas>
<canvas id="fireworks"></canvas>

<audio id="music">
  <source src="song.mpeg" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
